<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yeager Chats - Premium</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <!-- Tone.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #00E676, #00A859);
            --primary-color: #00E676;
            --bg-color: #0a0a0c;
            --surface-color: rgba(26, 26, 29, 0.7);
            --surface-solid: #161618;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-color: rgba(255, 255, 255, 0.08);
            --danger-color: #ff3b30;
            --bubble-me: linear-gradient(135deg, #00E676, #00B25E);
            --bubble-other: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: var(--text-main);
        }

        /* Background Ambient Glow */
        body::before {
            content: ''; position: absolute; top: 20%; left: 50%; width: 300px; height: 300px;
            background: var(--primary-color); filter: blur(150px); opacity: 0.15; transform: translate(-50%, -50%); z-index: 0; pointer-events: none;
        }

        #app-container {
            width: 100%; max-width: 420px; height: 100%; max-height: 850px;
            background-color: var(--bg-color); position: relative;
            overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 1;
        }

        @media (min-width: 450px) { #app-container { border-radius: 30px; height: 95vh; border: 1px solid var(--border-color); } }

        .hidden { display: none !important; }

        /* Typography & Inputs */
        h1, h2, h3 { font-weight: 600; letter-spacing: -0.5px; }
        input, textarea {
            width: 100%; padding: 16px; margin-bottom: 15px; border: 1px solid var(--border-color);
            border-radius: 16px; font-size: 14px; background: var(--surface-solid); color: var(--text-main);
            outline: none; transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        input:focus, textarea:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(0, 230, 118, 0.15); }
        
        button {
            width: 100%; padding: 16px; border: none; border-radius: 16px;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--primary-grad); color: #000; box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3); }
        .btn-primary:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(0, 230, 118, 0.2); }
        .btn-secondary { background: var(--surface-solid); color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-danger { background: rgba(255, 59, 48, 0.15); color: var(--danger-color); }

        /* Views & Animations */
        .view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; z-index: 10;
            background: var(--bg-color); animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .center-content { padding: 30px; justify-content: center; text-align: center; }

        /* Auth Screen */
        .logo-container { width: 80px; height: 80px; background: var(--primary-grad); border-radius: 24px; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px; box-shadow: 0 10px 30px rgba(0, 230, 118, 0.3); transform: rotate(-10deg); }
        .logo-container span { font-size: 40px; color: #000; transform: rotate(10deg); }

        /* Main Header */
        .header {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 24px;
            background: var(--surface-color); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color); z-index: 20; position: sticky; top: 0;
        }
        .header h2 { font-size: 20px; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-btn { background: none; border: none; padding: 8px; color: var(--text-main); border-radius: 50%; width: 40px; height: 40px; transition: 0.2s; box-shadow: none; }
        .icon-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.9); }

        /* Tabs & Lists */
        .tab-content { flex: 1; overflow-y: auto; padding: 15px 15px 90px 15px; } /* Padding bottom for floating nav */
        .tab-content::-webkit-scrollbar { width: 4px; }
        .tab-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        .list-item {
            display: flex; align-items: center; padding: 12px 16px; border-radius: 20px;
            margin-bottom: 10px; background: rgba(255,255,255,0.03); border: 1px solid transparent;
            cursor: pointer; transition: 0.3s;
        }
        .list-item:hover { background: rgba(255,255,255,0.06); border-color: var(--border-color); transform: translateY(-2px); }
        .list-item img { width: 50px; height: 50px; border-radius: 18px; margin-right: 16px; object-fit: cover; }
        .list-info { flex: 1; overflow: hidden; }
        .list-info h4 { font-size: 15px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .list-info p { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; box-shadow: 0 0 0 2px var(--bg-color); }
        .status-dot.online { background: var(--primary-color); box-shadow: 0 0 8px var(--primary-color); }
        .unread-badge { background: var(--primary-grad); color: #000; font-size: 12px; height: 22px; min-width: 22px; display: flex; justify-content: center; align-items: center; border-radius: 11px; font-weight: 700; padding: 0 6px; }

        /* Floating Bottom Nav */
        .bottom-nav {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(30, 30, 34, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color); border-radius: 30px; display: flex; padding: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 20;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 0; color: var(--text-muted); cursor: pointer; transition: 0.3s; border-radius: 20px; }
        .nav-item span { font-size: 24px; margin-bottom: 2px; transition: 0.3s; }
        .nav-item p { font-size: 10px; font-weight: 500; }
        .nav-item.active { color: var(--primary-color); background: rgba(0, 230, 118, 0.1); }
        .nav-item.active span { font-variation-settings: 'FILL' 1; transform: translateY(-2px); }

        /* Chat View */
        .chat-header { background: var(--surface-color); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; align-items: center; padding: 15px; border-bottom: 1px solid var(--border-color); z-index: 2;}
        .chat-header img { width: 40px; height: 40px; border-radius: 14px; margin: 0 12px; object-fit: cover; }
        .chat-actions { margin-left: auto; display: flex; gap: 4px;}
        
        .chat-messages { flex: 1; padding: 20px 20px 100px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; z-index: 1;}
        .message { max-width: 78%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.4; position: relative; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform-origin: bottom; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .message.me { background: var(--bubble-me); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.other { background: var(--bubble-other); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--border-color); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; display: block; font-weight: 500;}
        
        .typing-indicator { font-size: 12px; color: var(--primary-color); padding: 0 20px; font-weight: 500; display: flex; align-items: center; gap: 4px; position: absolute; bottom: 85px; left: 0; z-index: 2;}
        .typing-dots { display: flex; gap: 3px; }
        .typing-dots span { width: 4px; height: 4px; background: var(--primary-color); border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; } .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

        /* Floating Chat Input */
        .chat-input-area { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); width: 92%; display: flex; background: rgba(30,30,34, 0.9); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 30px; padding: 6px; align-items: center; z-index: 3; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chat-input-area input { margin: 0; border: none; background: transparent; padding: 10px 15px; box-shadow: none; flex: 1; }
        .chat-input-area button { width: 45px; height: 45px; margin: 0; border-radius: 50%; padding: 0; background: var(--primary-grad); color: #000; flex-shrink: 0; }

        /* Side Menu & Modals */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 50; display: flex; justify-content: flex-start; opacity: 0; transition: 0.3s; pointer-events: none; }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        
        .side-menu { width: 75%; height: 100%; background: var(--surface-solid); padding: 30px 20px; transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); display: flex; flex-direction: column; border-right: 1px solid var(--border-color); }
        .modal-overlay.show .side-menu { transform: translateX(0); }
        
        .modal-content { background: var(--surface-solid); width: 90%; max-width: 350px; margin: auto; padding: 25px; border-radius: 24px; position: relative; border: 1px solid var(--border-color); transform: scale(0.9); transition: 0.3s; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .modal-overlay.show .modal-content { transform: scale(1); }

        /* Advanced Call Screen */
        #call-screen { z-index: 100; background: #000; color: white; display: flex; flex-direction: column; position: relative; }
        #call-bg-blur { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; filter: blur(40px) brightness(0.3); z-index: 0; }
        
        .call-info { position: absolute; top: 15%; width: 100%; text-align: center; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        .call-dp-wrapper { position: relative; width: 120px; height: 120px; margin-bottom: 20px; }
        .call-dp-wrapper img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary-color); object-fit: cover; position: relative; z-index: 2;}
        .ripple { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; background: var(--primary-color); border-radius: 50%; z-index: 1; animation: pulseRing 2s infinite; opacity: 0.5; }
        @keyframes pulseRing { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; } }

        #remote-video { width: 100%; height: 100%; object-fit: cover; background: transparent; z-index: 1; position: absolute; }
        #local-video { position: absolute; bottom: 130px; right: 20px; width: 110px; height: 160px; object-fit: cover; border-radius: 16px; border: 2px solid rgba(255,255,255,0.2); background: #111; z-index: 5; box-shadow: 0 10px 20px rgba(0,0,0,0.5); cursor: grab; }
        
        .call-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,0.8); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 40px; padding: 15px 25px; display: flex; justify-content: center; gap: 25px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .call-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; border: none; margin: 0; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .call-btn span { font-size: 28px; }
        .call-btn:active { transform: scale(0.9); }
        .btn-accept { background: var(--primary-grad); color: #000; }
        .btn-reject { background: var(--danger-color); }
        .btn-mute { background: rgba(255,255,255,0.2); }

        /* Custom buttons for Request Action */
        .req-actions { display: flex; gap: 8px; }
        .btn-acc, .btn-rej { width: 35px; height: 35px; border-radius: 12px; display: flex; justify-content: center; align-items: center; border: none; cursor: pointer; color: white; transition: 0.2s;}
        .btn-acc { background: var(--primary-grad); color: #000; }
        .btn-rej { background: rgba(255, 59, 48, 0.2); color: var(--danger-color); }
    </style>
</head>
<body>

<div id="app-container">

    <!-- Auth View -->
    <div id="auth-view" class="view center-content">
        <div class="logo-container"><span class="material-symbols-rounded">chat_bubble</span></div>
        <h1 style="margin-bottom: 5px; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Yeager Chats</h1>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 30px;">Connect with premium experience</p>
        
        <div id="login-form" style="width: 100%;">
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-pass" placeholder="Password">
            <button class="btn-primary" id="btn-login">Login <span class="material-symbols-rounded" style="font-size: 18px;">arrow_forward</span></button>
            <p style="font-size: 13px; color: var(--text-muted); margin-top: 20px;">New here? <span id="toggle-signup" style="color: var(--primary-color); cursor: pointer; font-weight: 500;">Create Account</span></p>
        </div>
        <div id="signup-form" class="hidden" style="width: 100%;">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="password" id="reg-pass" placeholder="Password">
            <button class="btn-primary" id="btn-register">Sign Up <span class="material-symbols-rounded" style="font-size: 18px;">person_add</span></button>
            <p style="font-size: 13px; color: var(--text-muted); margin-top: 20px;">Already have an account? <span id="toggle-login" style="color: var(--primary-color); cursor: pointer; font-weight: 500;">Login</span></p>
        </div>
    </div>

    <!-- Profile Setup View -->
    <div id="profile-setup-view" class="view center-content hidden">
        <h2 style="margin-bottom: 5px;" id="setup-title">Setup Profile</h2>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">Make it yours</p>
        
        <!-- Live DP Preview -->
        <div style="width: 110px; height: 110px; margin: 0 auto 25px; border-radius: 50%; overflow: hidden; border: 3px solid var(--primary-color); box-shadow: 0 10px 20px rgba(0,0,0,0.5);">
            <img id="setup-dp-preview" src="" style="width: 100%; height: 100%; object-fit: cover;">
        </div>

        <input type="text" id="setup-name" placeholder="Display Name (Required)" maxlength="20">
        <input type="url" id="setup-dp-url" placeholder="Paste Image URL (Optional)">
        <textarea id="setup-bio" placeholder="Short Bio (Optional)" maxlength="100" rows="3"></textarea>
        
        <button class="btn-primary" id="btn-save-profile">Save Profile <span class="material-symbols-rounded" style="font-size: 18px;">check_circle</span></button>
        <button class="btn-secondary hidden" id="btn-cancel-setup" style="margin-top: 10px;">Cancel</button>
    </div>

    <!-- Main App View -->
    <div id="main-view" class="view hidden">
        <div class="header">
            <button class="icon-btn" id="btn-menu"><span class="material-symbols-rounded">menu</span></button>
            <h2>Yeager Chats</h2>
            <button class="icon-btn" id="btn-add-friend"><span class="material-symbols-rounded">person_add</span></button>
        </div>

        <!-- Tabs -->
        <div id="tab-home" class="tab-content"></div>
        <div id="tab-requests" class="tab-content hidden"></div>
        <div id="tab-calls" class="tab-content hidden"></div>

        <!-- Floating Bottom Nav -->
        <div class="bottom-nav">
            <div class="nav-item active" data-tab="home">
                <span class="material-symbols-rounded">chat</span>
                <p>Chats</p>
            </div>
            <div class="nav-item" data-tab="requests">
                <span class="material-symbols-rounded">group</span>
                <p>Requests</p>
            </div>
            <div class="nav-item" data-tab="calls">
                <span class="material-symbols-rounded">call</span>
                <p>Calls</p>
            </div>
        </div>
    </div>

    <!-- Chat View -->
    <div id="chat-view" class="view hidden">
        <div class="chat-header">
            <button class="icon-btn" id="btn-back-chat"><span class="material-symbols-rounded">arrow_back</span></button>
            <img id="chat-dp" src="">
            <div style="flex:1; overflow: hidden;">
                <h4 id="chat-name" style="font-size: 15px; margin-bottom: 2px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;">Name</h4>
                <div id="chat-status" style="font-size:11px; color:var(--text-muted); display:flex; align-items:center; gap:4px;">Offline</div>
            </div>
            <div class="chat-actions">
                <button class="icon-btn" id="btn-voice-call"><span class="material-symbols-rounded">call</span></button>
                <button class="icon-btn" id="btn-video-call"><span class="material-symbols-rounded">videocam</span></button>
                <button class="icon-btn" id="btn-clear-chat" style="color: var(--danger-color);"><span class="material-symbols-rounded">delete_sweep</span></button>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages"></div>
        
        <div class="typing-indicator hidden" id="typing-indicator">
            <div class="typing-dots"><span></span><span></span><span></span></div>
            Typing
        </div>
        
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message...">
            <button id="btn-send-msg"><span class="material-symbols-rounded" style="font-size: 20px;">send</span></button>
        </div>
    </div>

    <!-- Call Screen -->
    <div id="call-screen" class="view hidden">
        <img id="call-bg-blur" src="" alt="blur">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
        
        <div class="call-info" id="call-info">
            <div class="call-dp-wrapper">
                <div class="ripple" id="call-ripple"></div>
                <img id="call-dp" src="">
            </div>
            <h2 id="call-name" style="font-size: 24px; margin-bottom: 5px;">Name</h2>
            <p id="call-status" style="color: rgba(255,255,255,0.7); font-size: 15px;">Calling...</p>
        </div>

        <div class="call-controls" id="call-controls-outgoing">
            <button class="call-btn btn-reject" id="btn-end-call"><span class="material-symbols-rounded">call_end</span></button>
        </div>
        <div class="call-controls hidden" id="call-controls-incoming">
            <button class="call-btn btn-accept" id="btn-accept-call"><span class="material-symbols-rounded">call</span></button>
            <button class="call-btn btn-reject" id="btn-reject-call"><span class="material-symbols-rounded">call_end</span></button>
        </div>
        <div class="call-controls hidden" id="call-controls-active">
            <button class="call-btn btn-mute" id="btn-toggle-mute"><span class="material-symbols-rounded">mic</span></button>
            <button class="call-btn btn-reject" id="btn-hangup"><span class="material-symbols-rounded">call_end</span></button>
        </div>
    </div>

    <!-- Side Menu Overlay -->
    <div id="side-menu-overlay" class="modal-overlay">
        <div class="side-menu" id="side-menu">
            <button class="icon-btn" id="btn-close-menu" style="align-self: flex-end;"><span class="material-symbols-rounded">close</span></button>
            <div style="text-align: center; margin-top: 20px;">
                <img id="my-dp" style="width: 90px; height: 90px; border-radius: 30px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.3);">
                <h3 id="my-name" style="margin-top: 15px; font-size: 18px;">Name</h3>
                <div style="display:inline-block; background:rgba(0,230,118,0.1); color:var(--primary-color); padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; margin: 8px 0 15px;">ID: <span id="my-id"></span></div>
                <p id="my-bio" style="font-size: 13px; color: var(--text-muted); margin-bottom: 30px; padding: 0 10px;">Bio</p>
            </div>
            <button class="btn-secondary" id="btn-edit-profile" style="margin-bottom: 10px;"><span class="material-symbols-rounded">edit</span> Edit Profile</button>
            <button class="btn-danger" id="btn-logout" style="margin-top: auto;"><span class="material-symbols-rounded">logout</span> Logout</button>
        </div>
    </div>

    <!-- Add Friend Modal -->
    <div id="add-friend-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="icon-btn" id="btn-close-add" style="position: absolute; right: 10px; top: 10px;"><span class="material-symbols-rounded">close</span></button>
            <h3 style="margin-bottom: 20px; display:flex; align-items:center; gap:8px;"><span class="material-symbols-rounded" style="color:var(--primary-color);">person_add</span> Add Friend</h3>
            <input type="text" id="search-uid" placeholder="Enter ID (e.g. rk-1234)">
            <button class="btn-primary" id="btn-search-user">Search User</button>
            <div id="search-result" style="margin-top: 20px;"></div>
        </div>
    </div>

</div>

<!-- Firebase & Application Logic -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, set, get, push, onValue, update, remove, query, orderByChild, equalTo, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // ==========================================

    function emojiToSVG(chars) {
        const clean = chars.substring(0, 2).trim().toUpperCase() || "👤";
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00E676"/><stop offset="100%" stop-color="#00A859"/></linearGradient></defs>
            <rect width="100" height="100" fill="url(#g)"/>
            <text x="50" y="50" font-family="Arial" font-weight="bold" font-size="40" fill="#000" text-anchor="middle" dominant-baseline="central">${clean}</text>
        </svg>`;
        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;

    // WebRTC Calling
    const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

    async function playRingtone() {
        await Tone.start(); const synth = new Tone.Synth().toDestination();
        ringtoneLoop = new Tone.Loop(time => { synth.triggerAttackRelease("C5", "8n", time); synth.triggerAttackRelease("E5", "8n", time + 0.2); }, "1m").start(0);
        Tone.Transport.start();
    }
    function stopRingtone() { if(ringtoneLoop) ringtoneLoop.stop(); Tone.Transport.stop(); }

    document.getElementById('btn-voice-call').onclick = () => startCall('voice');
    document.getElementById('btn-video-call').onclick = () => startCall('video');

    async function startCall(type) {
        callType = type; isCaller = true; activeCallId = push(ref(db, 'calls')).key;
        showCallScreen(document.getElementById('chat-dp').src, document.getElementById('chat-name').innerText, 'Calling...');
        document.getElementById('call-controls-outgoing').classList.remove('hidden');
        document.getElementById('call-controls-incoming').classList.add('hidden');
        document.getElementById('call-controls-active').classList.add('hidden');
        document.getElementById('call-ripple').style.display = 'block';

        playRingtone();

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: type === 'video', audio: true });
            document.getElementById('local-video').srcObject = localStream;
            if(type === 'voice') document.getElementById('local-video').classList.add('hidden');
            else document.getElementById('local-video').classList.remove('hidden');

            peerConnection = new RTCPeerConnection(servers);
            remoteStream = new MediaStream(); document.getElementById('remote-video').srcObject = remoteStream;

            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = e => e.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));

            peerConnection.onicecandidate = e => { if(e.candidate) push(ref(db, `calls/${activeCallId}/callerCandidates`), e.candidate.toJSON()); };
            const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer);

            await set(ref(db, `calls/${activeCallId}`), {
                caller: currentUser.uid, callee: activeFriendUid, type: type, offer: { type: offer.type, sdp: offer.sdp }, status: 'calling', timestamp: serverTimestamp()
            });

            onValue(ref(db, `calls/${activeCallId}`), snap => {
                const data = snap.val(); if(!data) { endCallUI(); return; }
                if(data.status === 'answered' && data.answer && !peerConnection.currentRemoteDescription) {
                    peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    stopRingtone(); document.getElementById('call-status').innerText = 'Connected';
                    document.getElementById('call-ripple').style.display = 'none';
                    document.getElementById('call-controls-outgoing').classList.add('hidden');
                    document.getElementById('call-controls-active').classList.remove('hidden');
                }
                if(data.status === 'ended') endCallUI();
            });

            onValue(ref(db, `calls/${activeCallId}/calleeCandidates`), snap => {
                if(snap.exists()) snap.forEach(child => peerConnection.addIceCandidate(new RTCIceCandidate(child.val())));
            });

        } catch(e) { alert("Microphone/Camera access denied"); endCall(); }
    }

    function listenToIncomingCalls() {
        onValue(query(ref(db, 'calls'), orderByChild('callee'), equalTo(currentUser.uid)), async snap => {
            if(!snap.exists()) return;
            snap.forEach(child => {
                const call = child.val();
                if(call.status === 'calling') {
                    activeCallId = child.key; isCaller = false; callType = call.type;
                    get(ref(db, `users/${call.caller}`)).then(uSnap => {
                        if(uSnap.exists()){
                            const u = uSnap.val();
                            showCallScreen(u.dpUrl, u.name, `Incoming ${call.type} call...`);
                            document.getElementById('call-controls-outgoing').classList.add('hidden');
                            document.getElementById('call-controls-incoming').classList.remove('hidden');
                            document.getElementById('call-controls-active').classList.add('hidden');
                            document.getElementById('call-ripple').style.display = 'block';
                            playRingtone();
                        }
                    });
                }
                if(call.status === 'ended' && activeCallId === child.key) endCallUI();
            });
        });
    }

    document.getElementById('btn-accept-call').onclick = async () => {
        stopRingtone(); await Tone.start();
        document.getElementById('call-status').innerText = 'Connecting...';
        document.getElementById('call-ripple').style.display = 'none';
        document.getElementById('call-controls-incoming').classList.add('hidden');
        document.getElementById('call-controls-active').classList.remove('hidden');

        const callData = (await get(ref(db, `calls/${activeCallId}`))).val();
        localStream = await navigator.mediaDevices.getUserMedia({ video: callType === 'video', audio: true });
        document.getElementById('local-video').srcObject = localStream;
        if(callType === 'voice') document.getElementById('local-video').classList.add('hidden');
        else document.getElementById('local-video').classList.remove('hidden');

        peerConnection = new RTCPeerConnection(servers);
        remoteStream = new MediaStream(); document.getElementById('remote-video').srcObject = remoteStream;

        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        peerConnection.ontrack = e => e.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));

        peerConnection.onicecandidate = e => { if(e.candidate) push(ref(db, `calls/${activeCallId}/calleeCandidates`), e.candidate.toJSON()); };
        await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
        const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer);

        await update(ref(db, `calls/${activeCallId}`), { answer: { type: answer.type, sdp: answer.sdp }, status: 'answered' });
        onValue(ref(db, `calls/${activeCallId}/callerCandidates`), snap => {
            if(snap.exists()) snap.forEach(child => peerConnection.addIceCandidate(new RTCIceCandidate(child.val())));
        });
        document.getElementById('call-status').innerText = 'Connected';
    };

    async function endCall() {
        if(activeCallId) {
            await update(ref(db, `calls/${activeCallId}`), { status: 'ended' });
            push(ref(db, `callLogs/${currentUser.uid}`), { type: callType, dir: isCaller ? 'Outgoing' : 'Incoming', timestamp: Date.now() });
        }
        endCallUI();
    }

    function endCallUI() {
        stopRingtone();
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        if(remoteStream) remoteStream.getTracks().forEach(t => t.stop());
        if(peerConnection) peerConnection.close();
        localStream = null; remoteStream = null; peerConnection = null; activeCallId = null;
        showView(activeChatId ? 'chat' : 'main'); loadCallLogs();
    }

    const localVid = document.getElementById('local-video');
    let isDragging = false, startX, startY, initX, initY;
    localVid.addEventListener('touchstart', e => { isDragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY; const r = localVid.getBoundingClientRect(); const pr = localVid.parentElement.getBoundingClientRect(); initX = r.left - pr.left; initY = r.top - pr.top; }, {passive: false});
    document.addEventListener('touchmove', e => { if(!isDragging) return; e.preventDefault(); localVid.style.left = `${initX + (e.touches[0].clientX - startX)}px`; localVid.style.top = `${initY + (e.touches[0].clientY - startY)}px`; localVid.style.bottom = 'auto'; localVid.style.right = 'auto'; }, {passive: false});
    document.addEventListener('touchend', () => isDragging = false);

    // Call Logs
    function loadCallLogs() {
        if(!currentUser) return;
        onValue(query(ref(db, `callLogs/${currentUser.uid}`), orderByChild('timestamp')), snap => {
            const container = document.getElementById('tab-calls'); container.innerHTML = '';
            if(!snap.exists()){ container.innerHTML = `<div class="center-content" style="color:var(--text-muted);"><span class="material-symbols-rounded" style="font-size:40px;opacity:0.5;margin-bottom:10px;">history</span><p>No recent calls</p></div>`; return; }
            const logs = []; snap.forEach(c => { logs.push(c.val()); });
            logs.reverse().forEach(log => {
                const div = document.createElement('div'); div.className = 'list-item';
                div.innerHTML = `
                    <div style="width:45px;height:45px;border-radius:14px;background:rgba(255,255,255,0.05);display:flex;justify-content:center;align-items:center;margin-right:15px;color:var(--primary-color);">
                        <span class="material-symbols-rounded">${log.type === 'video' ? 'videocam' : 'call'}</span>
                    </div>
                    <div class="list-info">
                        <h4 style="color:${log.dir==='Incoming' ? 'var(--primary-color)' : '#fff'}">${log.dir} Call <span class="material-symbols-rounded" style="font-size:14px; opacity:0.7;">${log.dir==='Incoming' ? 'call_received' : 'call_made'}</span></h4>
                        <p>${formatTime(log.timestamp)}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        });
    }
</script>
</body>
</html>
